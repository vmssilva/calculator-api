<svg width="700" height="320" xmlns="http://www.w3.org/2000/svg">

<style>
.box{fill:#263238;stroke:#546e7a;stroke-width:2;rx:8}
.text{fill:#eceff1;font-family:monospace;font-size:14}
.title{fill:#81d4fa;font-family:monospace;font-size:16;font-weight:bold}
.arrow{stroke:#90caf9;stroke-width:2}
</style>

<!-- Base class -->

<rect class="box" x="260" y="20" width="180" height="70"></rect>
<text class="title" x="305" y="45">Expression</text>
<text class="text" x="285" y="70">+ interpret(): Double</text>

<!-- NumberExpression -->

<rect class="box" x="60" y="180" width="180" height="90"></rect>
<text class="title" x="80" y="205">NumberExpression</text>
<text class="text" x="75" y="230">- value: double</text>
<text class="text" x="75" y="255">+ interpret()</text>

<!-- UnaryExpression -->

<rect class="box" x="260" y="180" width="180" height="90"></rect>
<text class="title" x="285" y="205">UnaryExpression</text>
<text class="text" x="275" y="230">- operator</text>
<text class="text" x="275" y="250">- expression</text>
<text class="text" x="275" y="270">+ interpret()</text>

<!-- BinaryExpression -->

<rect class="box" x="460" y="180" width="180" height="90"></rect>
<text class="title" x="480" y="205">BinaryExpression</text>
<text class="text" x="475" y="230">- left</text>
<text class="text" x="475" y="250">- operator</text>
<text class="text" x="475" y="270">- right</text>

<!-- arrows -->

<line class="arrow" x1="150" y1="180" x2="320" y2="90"></line>
<line class="arrow" x1="350" y1="180" x2="350" y2="90"></line>
<line class="arrow" x1="550" y1="180" x2="380" y2="90"></line>

</svg>