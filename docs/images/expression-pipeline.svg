<svg width="900" height="220" xmlns="http://www.w3.org/2000/svg">
<style>
.box{fill:#263238;stroke:#546e7a;stroke-width:2;rx:8}
.text{fill:#eceff1;font-family:monospace;font-size:16}
.arrow{stroke:#90caf9;stroke-width:2;marker-end:url(#arrow)}
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#90caf9"></polygon>
</marker>
</defs>

<rect class="box" x="20" y="90" width="140" height="60"></rect>
<text class="text" x="45" y="125">Expression</text>

<rect class="box" x="200" y="90" width="120" height="60"></rect>
<text class="text" x="235" y="125">Tokenizer</text>

<rect class="box" x="360" y="90" width="150" height="60"></rect>
<text class="text" x="395" y="125">AST Parser</text>

<rect class="box" x="550" y="90" width="120" height="60"></rect>
<text class="text" x="585" y="125">AST Tree</text>

<rect class="box" x="710" y="90" width="150" height="60"></rect>
<text class="text" x="735" y="125">Interpreter</text>

<line class="arrow" x1="160" y1="120" x2="200" y2="120"></line>
<line class="arrow" x1="320" y1="120" x2="360" y2="120"></line>
<line class="arrow" x1="510" y1="120" x2="550" y2="120"></line>
<line class="arrow" x1="670" y1="120" x2="710" y2="120"></line>

</svg>